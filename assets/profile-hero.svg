<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">hrniux profile hero</title>
  <desc id="desc">A bold profile banner for hrniux featuring browser-native games, front-end experiments, and developer tooling in a modern showcase layout.</desc>
  <defs>
    <linearGradient id="page" x1="82" y1="44" x2="1184" y2="618" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07192C"/>
      <stop offset="0.42" stop-color="#0A1225"/>
      <stop offset="1" stop-color="#050913"/>
    </linearGradient>
    <linearGradient id="heroType" x1="132" y1="164" x2="718" y2="366" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7DD3FC"/>
      <stop offset="0.5" stop-color="#F59E0B"/>
      <stop offset="1" stop-color="#34D399"/>
    </linearGradient>
    <radialGradient id="blueGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(220 92) rotate(33) scale(360 240)">
      <stop stop-color="#38BDF8" stop-opacity="0.52"/>
      <stop offset="1" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="goldGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1120 458) rotate(146) scale(380 230)">
      <stop stop-color="#F59E0B" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="glass" x1="140" y1="116" x2="1142" y2="550" gradientUnits="userSpaceOnUse">
      <stop stop-color="#172235" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#0C1629" stop-opacity="0.96"/>
    </linearGradient>
    <filter id="panelShadow" x="96" y="74" width="1088" height="508" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="28" stdDeviation="36" flood-color="#020817" flood-opacity="0.46"/>
    </filter>
    <filter id="softBlur" x="-100" y="-100" width="1480" height="840" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="36"/>
    </filter>
  </defs>

  <rect width="1280" height="640" rx="34" fill="url(#page)"/>

  <g filter="url(#softBlur)">
    <ellipse cx="236" cy="96" rx="300" ry="176" fill="url(#blueGlow)"/>
    <ellipse cx="1094" cy="454" rx="250" ry="170" fill="url(#goldGlow)"/>
  </g>

  <g opacity="0.12">
    <path d="M0 86H1280" stroke="#E5EEF9"/>
    <path d="M0 158H1280" stroke="#E5EEF9"/>
    <path d="M0 230H1280" stroke="#E5EEF9"/>
    <path d="M0 302H1280" stroke="#E5EEF9"/>
    <path d="M0 374H1280" stroke="#E5EEF9"/>
    <path d="M0 446H1280" stroke="#E5EEF9"/>
    <path d="M0 518H1280" stroke="#E5EEF9"/>
    <path d="M116 0V640" stroke="#E5EEF9"/>
    <path d="M252 0V640" stroke="#E5EEF9"/>
    <path d="M388 0V640" stroke="#E5EEF9"/>
    <path d="M524 0V640" stroke="#E5EEF9"/>
    <path d="M660 0V640" stroke="#E5EEF9"/>
    <path d="M796 0V640" stroke="#E5EEF9"/>
    <path d="M932 0V640" stroke="#E5EEF9"/>
    <path d="M1068 0V640" stroke="#E5EEF9"/>
  </g>

  <g filter="url(#panelShadow)">
    <rect x="118" y="96" width="1044" height="460" rx="30" fill="url(#glass)" stroke="#FFFFFF" stroke-opacity="0.1"/>
    <rect x="144" y="122" width="992" height="408" rx="24" fill="#1A2539" fill-opacity="0.62" stroke="#FFFFFF" stroke-opacity="0.06"/>
  </g>

  <circle cx="178" cy="152" r="8.5" fill="#38BDF8"/>
  <circle cx="204" cy="152" r="8.5" fill="#F59E0B"/>
  <circle cx="230" cy="152" r="8.5" fill="#34D399"/>

  <text x="170" y="206" fill="#7DD3FC" font-family="Avenir Next, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="6">HRNIUX</text>
  <text x="170" y="252" fill="#DCEBFA" font-family="Avenir Next, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" letter-spacing="2.6">PLAYABLE SOFTWARE. PRODUCT SURFACES. WORKFLOWS THAT SHIP.</text>

  <text x="170" y="318" fill="url(#heroType)" font-family="Avenir Next, Segoe UI, Arial, sans-serif" font-size="64" font-weight="800">browser-native</text>
  <text x="170" y="384" fill="#EAF1FF" font-family="Avenir Next, Segoe UI, Arial, sans-serif" font-size="58" font-weight="800">games and</text>
  <text x="170" y="446" fill="#EAF1FF" font-family="Avenir Next, Segoe UI, Arial, sans-serif" font-size="58" font-weight="800">front-end tools.</text>

  <text x="170" y="500" fill="#BFD0E3" font-family="Avenir Next, Segoe UI, Arial, sans-serif" font-size="21" font-weight="500">
    Built to get opened fast, shared easily, and forked without friction.
  </text>

  <g>
    <rect x="900" y="144" width="198" height="104" rx="24" fill="#0B1830" fill-opacity="0.88" stroke="#7DD3FC" stroke-opacity="0.26"/>
    <text x="926" y="190" fill="#8FDBFF" font-family="Avenir Next, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="2.4">SIGNAL</text>
    <text x="926" y="222" fill="#FFFFFF" font-family="Avenir Next, Segoe UI, Arial, sans-serif" font-size="34" font-weight="800">43</text>
    <text x="926" y="242" fill="#BFD0E3" font-family="Avenir Next, Segoe UI, Arial, sans-serif" font-size="15" font-weight="600">playable pages</text>
  </g>

  <g>
    <rect x="866" y="272" width="232" height="104" rx="24" fill="#0E1728" fill-opacity="0.9" stroke="#F59E0B" stroke-opacity="0.26"/>
    <text x="892" y="318" fill="#FFD89A" font-family="Avenir Next, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="2.4">FOCUS</text>
    <text x="892" y="350" fill="#FFFFFF" font-family="Avenir Next, Segoe UI, Arial, sans-serif" font-size="31" font-weight="800">front-end craft</text>
    <text x="892" y="370" fill="#BFD0E3" font-family="Avenir Next, Segoe UI, Arial, sans-serif" font-size="15" font-weight="600">playables + workflow systems</text>
  </g>

  <g>
    <rect x="842" y="400" width="256" height="96" rx="24" fill="#0B1625" fill-opacity="0.9" stroke="#34D399" stroke-opacity="0.26"/>
    <text x="868" y="432" fill="#9FF6D3" font-family="Avenir Next, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="2.4">LIVE</text>
    <text x="868" y="466" fill="#FFFFFF" font-family="Avenir Next, Segoe UI, Arial, sans-serif" font-size="28" font-weight="800">demoCodex</text>
    <text x="868" y="486" fill="#BFD0E3" font-family="Avenir Next, Segoe UI, Arial, sans-serif" font-size="15" font-weight="600">play it in the browser</text>
  </g>

  <g>
    <rect x="170" y="548" width="172" height="24" rx="12" fill="#38BDF8" fill-opacity="0.18"/>
    <text x="192" y="565" fill="#D8F4FF" font-family="Avenir Next, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">HTML5 + Canvas</text>
    <rect x="360" y="548" width="186" height="24" rx="12" fill="#F59E0B" fill-opacity="0.18"/>
    <text x="384" y="565" fill="#FFE5BB" font-family="Avenir Next, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">Vanilla JavaScript</text>
    <rect x="566" y="548" width="188" height="24" rx="12" fill="#34D399" fill-opacity="0.18"/>
    <text x="591" y="565" fill="#D8FFEF" font-family="Avenir Next, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">Pragmatic tooling</text>
  </g>
</svg>
