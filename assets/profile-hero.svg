<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" shape-rendering="crispEdges">
  <title id="title">hrniux pixel profile hero</title>
  <desc id="desc">A pixel-style GitHub profile banner for hrniux featuring browser-native games and front-end tools in a chunky arcade-like layout.</desc>
  <defs>
    <linearGradient id="headline" x1="180" y1="210" x2="800" y2="380" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7DD3FC"/>
      <stop offset="0.5" stop-color="#FBBF24"/>
      <stop offset="1" stop-color="#A3E635"/>
    </linearGradient>
    <pattern id="grid" width="96" height="96" patternUnits="userSpaceOnUse">
      <path d="M0 0H96V96" stroke="#8CA3C9" stroke-opacity="0.18" stroke-width="2"/>
      <path d="M0 48H96" stroke="#8CA3C9" stroke-opacity="0.12" stroke-width="2"/>
      <path d="M48 0V96" stroke="#8CA3C9" stroke-opacity="0.12" stroke-width="2"/>
    </pattern>
    <pattern id="dots" width="16" height="16" patternUnits="userSpaceOnUse">
      <rect width="16" height="16" fill="none"/>
      <rect width="4" height="4" fill="#9BC3FF" fill-opacity="0.12"/>
    </pattern>
  </defs>

  <rect width="1280" height="640" fill="#040B16"/>
  <rect width="1280" height="640" fill="url(#grid)"/>
  <rect x="64" y="64" width="432" height="224" fill="#123A5A" fill-opacity="0.54"/>
  <rect x="992" y="352" width="224" height="192" fill="#4A2F14" fill-opacity="0.44"/>

  <rect x="104" y="96" width="1072" height="448" fill="#091321" stroke="#2B456D" stroke-width="4"/>
